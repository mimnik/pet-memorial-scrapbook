version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: pet_memorial_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pet_memorial_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: pet_memorial_backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/pet_memorial_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: changeMeToAtLeast32CharsSecretKey
      JWT_EXPIRATION: 86400000
      UPLOAD_DIR: /home/PetDatabase
    depends_on:
      - mysql
    ports:
      - '8080:8080'
    volumes:
      - /home/PetDatabase:/home/PetDatabase

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: pet_memorial_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  mysql_data:
