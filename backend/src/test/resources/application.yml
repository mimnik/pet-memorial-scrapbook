spring:
  datasource:
    url: jdbc:h2:mem:pet_memorial_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

logging:
  level:
    root: WARN

jwt:
  secret: testSecretKeyForJwtAtLeast32Chars
  expiration: 86400000

app:
  upload-dir: target/test-uploads
