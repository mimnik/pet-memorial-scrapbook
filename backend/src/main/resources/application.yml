spring:
  application:
    name: pet-memorial-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pet_memorial_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:8435261}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

  h2:
    console:
      enabled: false
      path: /h2-console
  
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

server:
  port: 8080

logging:
  level:
    com.pet.memorial: DEBUG
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:changeMeToAtLeast32CharsSecretKey}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  upload-dir: ${UPLOAD_DIR:uploads}